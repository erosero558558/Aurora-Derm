name: Production Monitor

on:
    schedule:
        - cron: '*/30 * * * *'
    workflow_dispatch:
        inputs:
            domain:
                description: 'Dominio objetivo'
                required: false
                default: 'https://pielarmonia.com'
                type: string
            max_latency_ms:
                description: 'Latencia maxima aceptada por endpoint (ms)'
                required: false
                default: '3500'
                type: string
            allow_degraded_figo:
                description: 'Permitir Figo en modo degraded temporalmente'
                required: false
                default: false
                type: boolean
            allow_store_calendar:
                description: 'Permitir agenda local/store en lugar de Google (temporal hasta cutover)'
                required: false
                default: true
                type: boolean
            require_google_calendar:
                description: 'Forzar validacion de calendario en modo Google estricto'
                required: false
                default: false
                type: boolean
            allow_blocked_calendar:
                description: 'Permitir calendarMode=blocked temporalmente'
                required: false
                default: false
                type: boolean
            skip_backup_check:
                description: 'Saltar validacion de backup en health'
                required: false
                default: false
                type: boolean
            allow_degraded_service_priorities:
                description: 'Permitir service-priorities en source distinto de catalog+funnel temporalmente'
                required: false
                default: false
                type: boolean
            min_service_priorities_services:
                description: 'Minimo de servicios esperados en service-priorities'
                required: false
                default: '1'
                type: string
            min_service_priorities_categories:
                description: 'Minimo de categorias esperadas en service-priorities'
                required: false
                default: '1'
                type: string
            min_service_priorities_featured:
                description: 'Minimo de destacados esperados en service-priorities'
                required: false
                default: '1'
                type: string
            require_service_priorities_funnel:
                description: 'Exigir source=catalog+funnel para service-priorities'
                required: false
                default: false
                type: boolean
            enable_public_cutover_monitor:
                description: 'Habilitar smoke publico post-cutover (routing + conversion)'
                required: false
                default: false
                type: boolean
            public_cutover_started_at:
                description: 'Fecha/hora de inicio de cutover (ISO 8601)'
                required: false
                default: ''
                type: string
            public_cutover_window_hours:
                description: 'Ventana activa post-cutover para smoke publico (horas)'
                required: false
                default: '72'
                type: string

concurrency:
    group: prod-monitor
    cancel-in-progress: true

permissions:
    contents: read
    issues: write

jobs:
    monitor:
        name: Health + latency monitor
        runs-on: windows-latest
        timeout-minutes: 10
        env:
            TARGET_DOMAIN: ${{ github.event.inputs.domain || 'https://pielarmonia.com' }}
            MAX_LATENCY_MS: ${{ github.event.inputs.max_latency_ms || '3500' }}
            ALLOW_DEGRADED_FIGO: ${{ github.event.inputs.allow_degraded_figo || 'false' }}
            ALLOW_STORE_CALENDAR: ${{ github.event.inputs.allow_store_calendar || vars.PROD_MONITOR_ALLOW_STORE_CALENDAR || 'true' }}
            ALLOW_BLOCKED_CALENDAR: ${{ github.event.inputs.allow_blocked_calendar || 'false' }}
            SKIP_BACKUP_CHECK: ${{ github.event.inputs.skip_backup_check || 'false' }}
            REQUIRE_GOOGLE_CALENDAR: ${{ github.event.inputs.require_google_calendar || vars.REQUIRE_GOOGLE_CALENDAR || 'false' }}
            ALLOW_DEGRADED_SERVICE_PRIORITIES: ${{ github.event.inputs.allow_degraded_service_priorities || 'false' }}
            MIN_SERVICE_PRIORITIES_SERVICES: ${{ github.event.inputs.min_service_priorities_services || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_SERVICES || '1' }}
            MIN_SERVICE_PRIORITIES_CATEGORIES: ${{ github.event.inputs.min_service_priorities_categories || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_CATEGORIES || '1' }}
            MIN_SERVICE_PRIORITIES_FEATURED: ${{ github.event.inputs.min_service_priorities_featured || vars.PROD_MONITOR_MIN_SERVICE_PRIORITIES_FEATURED || '1' }}
            REQUIRE_SERVICE_PRIORITIES_FUNNEL: ${{ github.event.inputs.require_service_priorities_funnel || vars.PROD_MONITOR_REQUIRE_SERVICE_PRIORITIES_FUNNEL || 'false' }}
            ENABLE_PUBLIC_CUTOVER_MONITOR: ${{ github.event.inputs.enable_public_cutover_monitor || vars.PROD_MONITOR_ENABLE_PUBLIC_CUTOVER || 'false' }}
            PUBLIC_CUTOVER_STARTED_AT: ${{ github.event.inputs.public_cutover_started_at || vars.PUBLIC_CUTOVER_STARTED_AT || '' }}
            PUBLIC_CUTOVER_WINDOW_HOURS: ${{ github.event.inputs.public_cutover_window_hours || vars.PUBLIC_CUTOVER_WINDOW_HOURS || '72' }}
            PUBLIC_CUTOVER_WINDOW_ACTIVE: 'false'
            PUBLIC_CUTOVER_WINDOW_REASON: 'disabled'
            PUBLIC_CUTOVER_ELAPSED_HOURS: ''
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Ejecutar monitor de produccion
              shell: pwsh
              run: |
                  $maxLatency = [int]$env:MAX_LATENCY_MS
                  if ($maxLatency -lt 500) { $maxLatency = 500 }

                  $requireGoogleCalendar = [string]$env:REQUIRE_GOOGLE_CALENDAR
                  $forceGoogle = $requireGoogleCalendar.ToLowerInvariant() -eq 'true'

                  $monitorArgs = @{
                    Domain = $env:TARGET_DOMAIN
                    MaxLatencyMs = $maxLatency
                  }

                  if ($env:ALLOW_DEGRADED_FIGO -eq 'true') {
                    $monitorArgs.AllowDegradedFigo = $true
                  }
                  if ($env:ALLOW_STORE_CALENDAR -eq 'true') {
                    $monitorArgs.AllowStoreCalendar = $true
                  }
                  if ($forceGoogle -and $monitorArgs.ContainsKey('AllowStoreCalendar')) {
                    $monitorArgs.Remove('AllowStoreCalendar')
                  }
                  if ($env:ALLOW_BLOCKED_CALENDAR -eq 'true') {
                    $monitorArgs.AllowBlockedCalendar = $true
                  }
                  if ($env:SKIP_BACKUP_CHECK -eq 'true') {
                    $monitorArgs.SkipBackupCheck = $true
                  }
                  if ($env:ALLOW_DEGRADED_SERVICE_PRIORITIES -eq 'true') {
                    $monitorArgs.AllowDegradedServicePriorities = $true
                  }
                  if ($env:REQUIRE_SERVICE_PRIORITIES_FUNNEL -eq 'true') {
                    $monitorArgs.RequireServicePrioritiesFunnel = $true
                  }

                  $minServices = [int]$env:MIN_SERVICE_PRIORITIES_SERVICES
                  if ($minServices -lt 0) { $minServices = 0 }
                  $monitorArgs.MinServicePrioritiesServices = $minServices

                  $minCategories = [int]$env:MIN_SERVICE_PRIORITIES_CATEGORIES
                  if ($minCategories -lt 0) { $minCategories = 0 }
                  $monitorArgs.MinServicePrioritiesCategories = $minCategories

                  $minFeatured = [int]$env:MIN_SERVICE_PRIORITIES_FEATURED
                  if ($minFeatured -lt 0) { $minFeatured = 0 }
                  $monitorArgs.MinServicePrioritiesFeatured = $minFeatured

                  & ./MONITOR-PRODUCCION.ps1 @monitorArgs

            - name: Evaluar ventana post-cutover publico
              id: cutover_window
              shell: pwsh
              run: |
                  $enabled = ([string]$env:ENABLE_PUBLIC_CUTOVER_MONITOR).ToLowerInvariant() -eq 'true'
                  $windowHours = 72.0
                  try {
                    $parsedWindow = [double]$env:PUBLIC_CUTOVER_WINDOW_HOURS
                    if ($parsedWindow -ge 1) {
                      $windowHours = $parsedWindow
                    }
                  } catch {
                    Write-Host "[WARN] PUBLIC_CUTOVER_WINDOW_HOURS invalido. Se usa 72h."
                  }

                  $active = $false
                  $reason = 'disabled'
                  $elapsedHours = ''

                  if ($enabled) {
                    $reason = 'missing_start'
                    $startRaw = [string]$env:PUBLIC_CUTOVER_STARTED_AT
                    if (-not [string]::IsNullOrWhiteSpace($startRaw)) {
                      try {
                        $startAt = [DateTimeOffset]::Parse(
                          $startRaw,
                          [System.Globalization.CultureInfo]::InvariantCulture,
                          [System.Globalization.DateTimeStyles]::AssumeUniversal
                        )
                        $nowUtc = [DateTimeOffset]::UtcNow
                        $elapsed = ($nowUtc - $startAt.ToUniversalTime()).TotalHours
                        $elapsedHours = [Math]::Round($elapsed, 2).ToString(
                          [System.Globalization.CultureInfo]::InvariantCulture
                        )
                        if ($elapsed -lt 0) {
                          $reason = 'future_start'
                        } elseif ($elapsed -le $windowHours) {
                          $active = $true
                          $reason = 'active'
                        } else {
                          $reason = 'window_elapsed'
                        }
                      } catch {
                        $reason = 'invalid_start'
                        Write-Host "[WARN] PUBLIC_CUTOVER_STARTED_AT invalido: $startRaw"
                      }
                    }
                  }

                  $activeValue = if ($active) { 'true' } else { 'false' }
                  "PUBLIC_CUTOVER_WINDOW_ACTIVE=$activeValue" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_CUTOVER_WINDOW_REASON=$reason" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                  "PUBLIC_CUTOVER_ELAPSED_HOURS=$elapsedHours" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                  "active=$activeValue" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "reason=$reason" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  "elapsed_hours=$elapsedHours" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
                  Write-Host "Cutover window => enabled=$enabled active=$activeValue reason=$reason elapsed_hours=$elapsedHours window_hours=$windowHours"

            - name: Setup Node para smoke publico post-cutover
              if: ${{ env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Validar routing + conversion publica post-cutover (ES/EN)
              id: public_cutover
              if: ${{ env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p .public-cutover-monitor
                  node bin/check-public-routing-smoke.js --base-url "${TARGET_DOMAIN}" --label "prod-monitor-cutover-routing" --output ".public-cutover-monitor/routing-smoke.json"
                  node bin/check-public-conversion-smoke.js --base-url "${TARGET_DOMAIN}" --label "prod-monitor-cutover-conversion" --output ".public-cutover-monitor/conversion-smoke.json"

            - name: Upload public cutover monitor evidence
              if: ${{ always() && env.PUBLIC_CUTOVER_WINDOW_ACTIVE == 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: public-cutover-monitor-evidence
                  path: .public-cutover-monitor/
                  if-no-files-found: warn
                  retention-days: 7

            - name: Resumen
              if: ${{ always() }}
              shell: pwsh
              run: |
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Production monitor"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Dominio: ``$env:TARGET_DOMAIN``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- Max latency: ``$env:MAX_LATENCY_MS ms``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_degraded_figo: ``$env:ALLOW_DEGRADED_FIGO``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_store_calendar: ``$env:ALLOW_STORE_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_blocked_calendar: ``$env:ALLOW_BLOCKED_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- skip_backup_check: ``$env:SKIP_BACKUP_CHECK``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- require_google_calendar: ``$env:REQUIRE_GOOGLE_CALENDAR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- allow_degraded_service_priorities: ``$env:ALLOW_DEGRADED_SERVICE_PRIORITIES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- min_service_priorities_services: ``$env:MIN_SERVICE_PRIORITIES_SERVICES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- min_service_priorities_categories: ``$env:MIN_SERVICE_PRIORITIES_CATEGORIES``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- min_service_priorities_featured: ``$env:MIN_SERVICE_PRIORITIES_FEATURED``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- require_service_priorities_funnel: ``$env:REQUIRE_SERVICE_PRIORITIES_FUNNEL``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- enable_public_cutover_monitor: ``$env:ENABLE_PUBLIC_CUTOVER_MONITOR``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- public_cutover_started_at: ``$env:PUBLIC_CUTOVER_STARTED_AT``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- public_cutover_window_hours: ``$env:PUBLIC_CUTOVER_WINDOW_HOURS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- public_cutover_window_active: ``$env:PUBLIC_CUTOVER_WINDOW_ACTIVE`` (reason ``$env:PUBLIC_CUTOVER_WINDOW_REASON``)"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- public_cutover_elapsed_hours: ``$env:PUBLIC_CUTOVER_ELAPSED_HOURS``"
                  Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- public_cutover_step_outcome: ``${{ steps.public_cutover.outcome }}``"

            - name: Crear/actualizar incidente (solo schedule)
              if: ${{ failure() && github.event_name == 'schedule' && steps.public_cutover.outcome != 'failure' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Monitor de produccion fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El workflow `Production Monitor` fallo en ejecucion programada.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert']
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: ['production-alert']
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Crear/actualizar incidente post-cutover publico (solo schedule)
              if: ${{ failure() && github.event_name == 'schedule' && steps.public_cutover.outcome == 'failure' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Monitor post-cutover publico degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();
                      const body = [
                        'El smoke post-cutover publico (routing/conversion ES/EN) fallo en ejecucion programada.',
                        '',
                        `- Fecha: ${now}`,
                        `- Run: ${runUrl}`,
                        `- Workflow: ${context.workflow}`,
                        `- Branch: ${context.ref}`,
                        `- target_domain: ${process.env.TARGET_DOMAIN || 'n/a'}`,
                        `- window_active: ${process.env.PUBLIC_CUTOVER_WINDOW_ACTIVE || 'n/a'}`,
                        `- window_reason: ${process.env.PUBLIC_CUTOVER_WINDOW_REASON || 'n/a'}`,
                        `- elapsed_hours: ${process.env.PUBLIC_CUTOVER_ELAPSED_HOURS || 'n/a'}`
                      ].join('\n');

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (existing) {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: existing.number,
                          body
                        });
                        await github.rest.issues.addLabels({
                          owner,
                          repo,
                          issue_number: existing.number,
                          labels: ['production-alert', 'public-cutover']
                        });
                        core.info(`Issue existente actualizado: #${existing.number}`);
                      } else {
                        const created = await github.rest.issues.create({
                          owner,
                          repo,
                          title,
                          body,
                          labels: ['production-alert', 'public-cutover']
                        });
                        core.info(`Issue creado: #${created.data.number}`);
                      }

            - name: Cerrar incidente al recuperar (solo schedule)
              if: ${{ success() && github.event_name == 'schedule' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Monitor de produccion fallando';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por monitor programado.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue cerrado: #${existing.number}`);

            - name: Cerrar incidente post-cutover al recuperar (solo schedule)
              if: ${{ success() && github.event_name == 'schedule' && steps.public_cutover.outcome != 'failure' }}
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const repo = context.repo.repo;
                      const title = '[ALERTA PROD] Monitor post-cutover publico degradado';
                      const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
                      const now = new Date().toISOString();

                      const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                        owner,
                        repo,
                        state: 'open',
                        per_page: 100
                      });

                      const existing = openIssues.find((issue) => !issue.pull_request && issue.title === title);
                      if (!existing) {
                        core.info('No hay incidente post-cutover abierto para cerrar.');
                        return;
                      }

                      await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: existing.number,
                        body: [
                          'Recuperado automaticamente por monitor programado.',
                          '',
                          `- Fecha: ${now}`,
                          `- Run: ${runUrl}`,
                          `- window_active: ${process.env.PUBLIC_CUTOVER_WINDOW_ACTIVE || 'n/a'}`,
                          `- window_reason: ${process.env.PUBLIC_CUTOVER_WINDOW_REASON || 'n/a'}`,
                          `- elapsed_hours: ${process.env.PUBLIC_CUTOVER_ELAPSED_HOURS || 'n/a'}`
                        ].join('\n')
                      });

                      await github.rest.issues.update({
                        owner,
                        repo,
                        issue_number: existing.number,
                        state: 'closed'
                      });
                      core.info(`Issue post-cutover cerrado: #${existing.number}`);
