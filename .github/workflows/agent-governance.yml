name: Agent Governance

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]
    workflow_dispatch:

concurrency:
    group: agent-governance-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read
    issues: write
    pull-requests: write

jobs:
    governance:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'

            - name: Install dependencies
              run: npm ci

            - name: Agent status snapshot
              run: node agent-orchestrator.js status

            - name: Orchestrator CLI tests
              run: npm run agent:test

            - name: Conflict gate
              run: node agent-orchestrator.js conflicts --strict

            - name: Handoffs lint
              run: node agent-orchestrator.js handoffs lint

            - name: Codex mirror check
              run: node agent-orchestrator.js codex-check

            - name: Validate governance contract
              run: php bin/validate-agent-governance.php

            - name: Build governance summary (JSON + Markdown)
              if: always()
              run: |
                  mkdir -p verification
                  node bin/agent-governance-summary.js --profile local --write-json verification/agent-governance-summary.json --write-md verification/agent-governance-summary.md --format markdown > /tmp/agent-governance-summary.md
                  cat /tmp/agent-governance-summary.md >> "$GITHUB_STEP_SUMMARY"

            - name: Evaluate governance red-signal policy (non-blocking)
              if: always()
              continue-on-error: true
              run: |
                  node - <<'NODE'
                  const fs = require('fs');
                  const path = 'verification/agent-governance-summary.json';
                  if (!fs.existsSync(path)) {
                    console.warn('::warning::Governance summary JSON not found; policy probe skipped.');
                    process.exit(0);
                  }
                  const report = JSON.parse(fs.readFileSync(path, 'utf8'));
                  const policy = report?.policies?.fail_on_red;
                  if (!policy) {
                    console.warn('::warning::Governance policy `fail_on_red` not available in summary JSON.');
                    process.exit(0);
                  }
                  if (policy.pass) {
                    console.log(`Governance fail_on_red policy PASS (${policy.reason || 'n/a'})`);
                    process.exit(0);
                  }
                  console.warn(`::warning::Governance fail_on_red policy FAIL (${policy.reason || 'n/a'})`);
                  process.exit(1);
                  NODE

            - name: Upload governance summary artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: agent-governance-summary
                  path: |
                      verification/agent-governance-summary.json
                      verification/agent-governance-summary.md

            - name: Comment governance summary on PR
              if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
              continue-on-error: true
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const path = 'verification/agent-governance-summary.md';
                      const marker = '<!-- agent-governance-summary -->';
                      let summaryMd = 'Resumen de gobernanza no disponible (artifact faltante).';
                      if (fs.existsSync(path)) {
                        summaryMd = fs.readFileSync(path, 'utf8').trim();
                      }
                      const body = `${marker}\n${summaryMd}`;
                      const issue_number = context.issue.number;
                      const { owner, repo } = context.repo;
                      const comments = await github.paginate(
                        github.rest.issues.listComments,
                        { owner, repo, issue_number, per_page: 100 }
                      );
                      const existing = comments.find((c) =>
                        c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
                      );
                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner,
                          repo,
                          comment_id: existing.id,
                          body,
                        });
                        core.info(`Updated governance summary comment: ${existing.id}`);
                      } else {
                        const created = await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number,
                          body,
                        });
                        core.info(`Created governance summary comment: ${created.data.id}`);
                      }
