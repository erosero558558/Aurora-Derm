name: Agent Governance

on:
    push:
        branches: [main, staging]
    pull_request:
        branches: [main, staging]
    workflow_dispatch:

concurrency:
    group: agent-governance-${{ github.ref }}
    cancel-in-progress: true

jobs:
    governance:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'

            - name: Install dependencies
              run: npm ci

            - name: Agent status snapshot
              run: node agent-orchestrator.js status

            - name: Orchestrator CLI tests
              run: npm run agent:test

            - name: Conflict gate
              run: node agent-orchestrator.js conflicts --strict

            - name: Handoffs lint
              run: node agent-orchestrator.js handoffs lint

            - name: Codex mirror check
              run: node agent-orchestrator.js codex-check

            - name: Validate governance contract
              run: php bin/validate-agent-governance.php

            - name: Build governance summary (JSON + Markdown)
              if: always()
              run: |
                  mkdir -p verification
                  node bin/agent-governance-summary.js --write-json verification/agent-governance-summary.json --write-md verification/agent-governance-summary.md --format markdown > /tmp/agent-governance-summary.md
                  cat /tmp/agent-governance-summary.md >> "$GITHUB_STEP_SUMMARY"

            - name: Upload governance summary artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: agent-governance-summary
                  path: |
                      verification/agent-governance-summary.json
                      verification/agent-governance-summary.md
